---
# Install Docker and Docker Compose on Ubuntu Linux VM

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
    state: present

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  notify: restart docker

- name: Install Docker Compose (standalone)
  get_url:
    url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-{{ ansible_system }}-{{ ansible_machine }}"
    dest: /usr/local/bin/docker-compose
    mode: '0755'

- name: Verify Docker installation
  shell: docker --version
  register: docker_version_output
  changed_when: false

- name: Display Docker version
  debug:
    msg: "{{ docker_version_output.stdout }}"

- name: Add azureuser to docker group
  user:
    name: azureuser
    groups: docker
    append: yes
  notify: reset ssh connection

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started
    daemon_reload: yes

- name: Test Docker functionality
  command: docker run --rm hello-world
  changed_when: false
  register: docker_hello_world

- name: Docker test output
  debug:
    msg: "Docker is working correctly"
  when: "'Hello from Docker' in docker_hello_world.stdout"
