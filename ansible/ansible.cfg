[defaults]
# Ansible configuration for 3D Figurine Lab deployment

# Inventory location
inventory = ./inventory/hosts

# Roles path
roles_path = ./roles

# Connection settings
remote_user = azureuser
private_key_file = ~/.ssh/azure_3dfigurine

# Disable host key checking (for Azure VMs)
host_key_checking = False

# Connection timeout
timeout = 30

# Parallel execution
forks = 5

# Become settings for privilege escalation
become = True
become_method = sudo
become_user = root

# Logging
log_path = ./ansible.log

# Privilege escalation
[privilege_escalation]
become = True
become_method = sudo
