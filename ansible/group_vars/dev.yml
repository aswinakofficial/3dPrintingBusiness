# Development environment variables
---
environment: dev
docker_registry: myregistry.azurecr.io
container_trellis_image: "{{ docker_registry }}/3dfigurine-trellis:dev"
container_meshroom_image: "{{ docker_registry }}/3dfigurine-meshroom:dev"

# Resource limits (dev - reduced for cost)
docker_memory_limit: "40g"
docker_cpus_limit: "16"

# Volume mounts
data_volumes:
  input: /opt/3dfigurine/input
  output: /opt/3dfigurine/output
  logs: /opt/3dfigurine/logs
  models_cache: /opt/3dfigurine/models

# Services to enable (can disable for cost savings)
enable_trellis: yes
enable_meshroom: yes
enable_monitoring: yes

# Auto-restart policy
docker_restart_policy: unless-stopped
docker_restart_max_retries: 2

# Logging configuration (reduced for cost)
logging_driver: json-file
logging_max_file: "10m"
logging_max_files: "3"

# GPU configuration
gpu_count: 1  # Use single GPU in dev
cuda_visible_devices: "0"

# Performance tuning
enable_gpu_persistence: no  # Disable in dev to reduce power
enable_gpu_clock_control: no

# Backup configuration (minimal in dev)
enable_backups: no
backup_retention_days: 1

# Security (relaxed in development)
ssh_hardening: no
firewall_enabled: no
fail2ban_enabled: no

# Frequent updates for testing
check_for_updates: yes
auto_update: yes  # Auto-update in dev for testing

# Debug logging
debug_logging: yes
verbose_output: yes
