# Production environment variables
---
environment: prod
docker_registry: myregistry.azurecr.io
container_trellis_image: "{{ docker_registry }}/3dfigurine-trellis:latest"
container_meshroom_image: "{{ docker_registry }}/3dfigurine-meshroom:latest"

# Resource limits (production)
docker_memory_limit: "80g"
docker_cpus_limit: "30"

# Volume mounts
data_volumes:
  input: /opt/3dfigurine/input
  output: /opt/3dfigurine/output
  logs: /opt/3dfigurine/logs
  models_cache: /opt/3dfigurine/models

# Services to enable
enable_trellis: yes
enable_meshroom: yes
enable_monitoring: yes

# Auto-restart policy
docker_restart_policy: always
docker_restart_max_retries: 5

# Logging configuration
logging_driver: json-file
logging_max_file: "100m"
logging_max_files: "10"

# GPU configuration
gpu_count: 2
cuda_visible_devices: "0,1"

# Performance tuning
enable_gpu_persistence: yes
enable_gpu_clock_control: yes

# Backup configuration
enable_backups: yes
backup_retention_days: 30
backup_schedule: "0 2 * * *"  # 2 AM daily

# Security
ssh_hardening: yes
firewall_enabled: yes
fail2ban_enabled: yes
